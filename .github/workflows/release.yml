name: 'release'

on:
  workflow_dispatch:
    inputs:
      changelog:
        type: string
        description: 'The frontend changelog'
        required: true

  push:
    branches:
      - 'main'
      - 'alpha'
jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      NEXT_VERSION: ${{ steps.dry-run.outputs.NEXT_VERSION }}
    steps:
      - uses: actions/checkout@v3
        with:
          submodules: recursive

      - uses: actions/setup-node@v4
        with:
          node-version: 22.14.0

      - name: Semantic Release dry-run
        id: dry-run
        run: |
          npm i -g @semantic-release/exec @semantic-release/commit-analyzer @semantic-release/git semantic-release
          semantic-release --dry-run --yes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release:
    needs: prepare
    if: ${{ needs.prepare.outputs.NEXT_VERSION != '' }}
    strategy:
      fail-fast: false
      matrix:
        python-version: [3.11]
        os: [ubuntu-24.04]
        node-version: [22.14.0]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v3
        with:
          submodules: recursive

      - name: Get next version
        id: get-next-version
        run: |
          echo "NEXT_VERSION=$(echo "${{ needs.prepare.outputs.NEXT_VERSION }}")" >> $GITHUB_ENV

      - uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Download frontend
        env:
          CURRENT_BRANCH: ${{ github.ref_name }}
        run: |
          sh ./scripts/resolve_frontend.sh true

        # ====================== release ======================

      - name: Set release pip url
        if: ${{ github.ref_name == 'main' || github.ref_name == 'alpha' }}
        env:
          NEXT_VERSION: ${{ env.NEXT_VERSION }}
        run: |
          echo "PYPI_URL=https://pypi.org/project/labelu/${{ env.NEXT_VERSION }}" >> $GITHUB_ENV

      - name: Show pypi url
        run: |
          echo $PYPI_URL

      - name: Inject backend info into frontend
        env:
          NEXT_VERSION: ${{ env.NEXT_VERSION }}
        run: |
          python3 << 'PYEOF'
          import json, datetime, os, tomllib

          with open('pyproject.toml', 'rb') as f:
              cfg = tomllib.load(f)

          name = cfg.get('project', {}).get('name') or 'LabelU'
          info = {
              'version': os.environ['NEXT_VERSION'],
              'name': name,
              'build_time': datetime.datetime.utcnow().isoformat() + 'Z',
              'commit': os.environ.get('GITHUB_SHA', ''),
          }

          js = '(function () {\n  window.__backend = ' + json.dumps(info, indent=2) + ';\n})();\n'

          with open('labelu/internal/statics/backend_version.js', 'w') as f:
              f.write(js)

          print('Update backend_version.js success!')
          PYEOF

      - name: Install dependencies
        run: uv sync --frozen --group test

      - name: Run tests
        run: uv run --group test pytest --cov=./ --cov-report=xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          token: ${{ secrets.CODECOV_TOKEN }} # not required for public repos
          files: ./coverage.xml
          verbose: true

      - name: Manage version
        run: |
          sed -i "s/^version[ ]*=.*/version = '${NEXT_VERSION}'/" pyproject.toml
          sed -i "s/^version[ ]*=.*/version='${NEXT_VERSION}'/" labelu/version.py

      - name: Publish to PyPi
        # main or alpha
        if: ${{ github.ref_name == 'main' || github.ref_name == 'alpha' }}
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.PYPI_TOKEN }}
        run: |
          uv build
          uv publish --skip-existing

      - name: Semantic Release
        run: |
          npm i -g semantic-release @semantic-release/git @semantic-release/commit-analyzer @semantic-release/release-notes-generator @semantic-release/exec @semantic-release/github
          semantic-release --yes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ====================== post release ======================
      
      - name: Send release notification
        env:
          CHANGELOG: ${{ github.event.inputs.changelog != '' && format('## Frontend changelog👇🏻 \n\n{0}\n\n\n', github.event.inputs.changelog) || '' }}
          WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
          RELEASE_NOTES: ${{ env.RELEASE_NOTES }}
          NEXT_VERSION: ${{ env.NEXT_VERSION }}
          PYPI_URL: ${{ env.PYPI_URL }}
        run: |
          node ./scripts/release-notification.js
          
