name: 'Claude Auto Fix Issue'

on:
  issues:
    types: [labeled]

jobs:
  fix-issue:
    if: github.event.label.name == 'claude-fix'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
    env:
      ANTHROPIC_BASE_URL: ${{ secrets.ANTHROPIC_BASE_URL }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Poetry
        run: pip install poetry==1.2.2

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Create branch
        run: |
          BRANCH_NAME="claude/issue-${{ github.event.issue.number }}"
          git checkout -b "$BRANCH_NAME"
          echo "BRANCH_NAME=$BRANCH_NAME" >> $GITHUB_ENV

      - name: Run Claude Code to fix issue
        run: |
          cat <<'PROMPT' > /tmp/claude-prompt.txt
          你是 LabelU 项目的自动修复助手。请根据以下 issue 修复问题。

          ## Issue #${{ github.event.issue.number }}
          标题: ${{ github.event.issue.title }}
          内容: ${{ github.event.issue.body }}

          ## 要求
          1. 仔细阅读 CLAUDE.md 了解项目架构
          2. 分析问题根因
          3. 按照项目的分层架构（adapter/application/domain/common）修复代码
          4. 运行测试确保通过: poetry run pytest
          5. 如果修复涉及新的行为，请添加相应的测试用例
          6. 用 git add 和 git commit 提交修改，commit message 遵循 conventional commits 格式
          PROMPT
          cat /tmp/claude-prompt.txt | claude --print \
            --model claude-opus-4-6 \
            --allowedTools "Bash(poetry*),Bash(git*),Read,Write,Edit,Glob,Grep"

      - name: Push and create PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git push origin "$BRANCH_NAME"
          gh pr create \
            --title "fix: auto-fix issue #${{ github.event.issue.number }}" \
            --body "$(cat <<'EOF'
          ## Auto-fix for #${{ github.event.issue.number }}

          **Issue:** ${{ github.event.issue.title }}

          This PR was automatically generated by Claude Code to fix the reported issue.

          Closes #${{ github.event.issue.number }}
          EOF
          )" \
            --base main \
            --head "$BRANCH_NAME"
